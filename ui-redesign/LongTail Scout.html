<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>longtailscout.com — the field manual for the long tail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <script>
    // Tweak defaults — single source of truth, host rewrites this block on persist.
    window.__TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "palette": "blueprint",
      "show_demand": true,
      "show_memory": true,
      "open_op": "bayouroof.co"
    }/*EDITMODE-END*/;
  </script>

  <style>
    :root {
      --font-serif: "Fraunces", ui-serif, Georgia, serif;
      --font-sans:  "Inter", ui-sans-serif, system-ui, sans-serif;
      --font-mono:  "JetBrains Mono", ui-monospace, "SFMono-Regular", monospace;

      /* Default cream palette (overridden by JS for theme switch) */
      --paper:      #F5F0E4;
      --paper-2:    #EFE9DA;
      --paper-3:    #E9E2CF;
      --ink:        #1A1814;
      --ink-deep:   #15130F;
      --ink-90:     #26221C;
      --ink-80:     #3A3530;
      --ink-70:     #4F4942;
      --ink-60:     #6B645B;
      --ink-50:     #857E73;
      --ink-40:     #A39C90;
      --ink-30:     #BFB8AC;
      --ink-25:     #CCC5B8;
      --ink-20:     #D2CBBE;
      --ink-15:     #DBD4C7;
      --ink-10:     #E2DCCF;
      --ink-08:     #E6E0D2;

      --rust:        #A8351F;
      --rust-dk:     #7A2415;
      --rust-tint:   #F4E1DA;
      --rust-bright: #D14E33;
      --moss:        #3E6B2C;
      --moss-dk:     #2A4A1E;
      --moss-tint:   #DCE5CC;
      --moss-bright: #7BC04A;
      --ochre:       #C68A2E;
      --ochre-dk:    #8B5E1E;
      --ochre-tint:  #F2E5C9;
      --ochre-bright:#E8B85B;
      --sky:         #3D7099;
      --sky-dk:      #2A5074;
      --sky-tint:    #DCE6EF;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: "ss01", "ss02";
    }

    /* paper grain texture — applied to body for subtle warmth */
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 100;
      opacity: 0.32;
      background-image:
        radial-gradient(circle at 20% 30%, var(--ink-10) 0.5px, transparent 1px),
        radial-gradient(circle at 65% 70%, var(--ink-10) 0.5px, transparent 1px),
        radial-gradient(circle at 80% 20%, var(--ink-08) 0.4px, transparent 0.9px);
      background-size: 7px 7px, 11px 11px, 5px 5px;
      mix-blend-mode: multiply;
    }

    input, button, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

    /* form controls */
    input[type="range"] {
      appearance: none; -webkit-appearance: none;
      background: transparent; height: 16px;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 2px; background: var(--ink-25);
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--ink); margin-top: -5px;
      border: 2px solid var(--paper);
      box-shadow: 0 0 0 1px var(--ink);
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 13px; height: 13px;
      accent-color: var(--ink);
    }

    a { text-decoration: none; color: inherit; }

    /* selection */
    ::selection { background: var(--ochre-tint); color: var(--ink); }

    /* ─── Leaflet customizations ─────────────────────────────────────────── */
    .lts-tile-layer {
      /* paper-friendly desaturation; the dark/blueprint palettes invert it */
      filter: saturate(0.55) contrast(0.95) brightness(1.02);
    }
    body[data-palette="ink"] .lts-tile-layer,
    body[data-palette="blueprint"] .lts-tile-layer {
      filter: invert(0.92) hue-rotate(180deg) saturate(0.4) brightness(0.85);
    }
    .leaflet-container {
      background: var(--paper) !important;
      font-family: var(--font-sans) !important;
    }
    .leaflet-control-zoom a {
      background: var(--paper) !important;
      color: var(--ink) !important;
      border: 1px solid var(--ink-20) !important;
      font-family: var(--font-mono) !important;
      font-weight: 600 !important;
    }
    .leaflet-control-zoom a:hover { background: var(--paper-2) !important; }
    .leaflet-control-attribution {
      background: color-mix(in oklab, var(--paper) 80%, transparent) !important;
      color: var(--ink-60) !important;
      font-family: var(--font-mono) !important;
      font-size: 9px !important;
      letter-spacing: 0.04em;
      padding: 2px 6px !important;
    }
    .leaflet-control-attribution a { color: var(--ink-70) !important; }

    .lts-pin {
      background: transparent; border: 0;
      display: flex; flex-direction: column; align-items: center;
    }
    .lts-pin-box {
      width: 26px; height: 22px;
      background: var(--ink);
      color: var(--paper);
      font-family: var(--font-mono); font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      border-radius: 2px;
      box-shadow: 0 1px 3px color-mix(in oklab, var(--ink) 45%, transparent);
    }
    .lts-pin-stem {
      width: 1.2px; height: 12px; background: var(--ink);
      margin-top: -1px;
    }
    .lts-pin::after {
      content: ""; width: 6px; height: 6px; border-radius: 50%;
      background: var(--ink); margin-top: -3px;
      box-shadow: 0 0 0 2px color-mix(in oklab, var(--paper) 90%, transparent);
    }

    .leaflet-tooltip {
      background: var(--paper) !important;
      border: 1px solid var(--ink-25) !important;
      color: var(--ink) !important;
      box-shadow: 0 2px 8px color-mix(in oklab, var(--ink) 20%, transparent) !important;
      border-radius: 2px !important;
      padding: 6px 9px !important;
      font-family: var(--font-sans) !important;
    }
    .leaflet-tooltip-top:before { border-top-color: var(--ink-25) !important; }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#F5F0E4"/>
      <g transform="translate(50,50)">
        <circle r="22" fill="none" stroke="#1A1814" stroke-width="2"/>
        <path d="M0 -22 L 5.5 0 L 0 22 L -5.5 0 Z" fill="#A8351F"/>
        <circle r="3" fill="#F5F0E4"/>
      </g>
      <text x="50" y="88" text-anchor="middle" font-family="Georgia,serif" font-size="9" font-style="italic" fill="#1A1814">longtail · scout</text>
    </svg>
  </template>
</head>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

</body>
